---
####### global space #######
############################
stages:
  - check
  - build

default:
  interruptible: true


variables:
  GITLAB_CI_ENV: 1
  GITLAB_BUILD_IMAGE: "docker:29.3.0-rc.1-dind"

###### reusable rules ######
############################
.base_rules:
  rules:
    default_branch:  # runs on default branch
      if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    tag:  # runs on tags
      if: $CI_COMMIT_TAG
    never_tag:
      if: $CI_COMMIT_TAG
      when: never
    merge_request:  # runs on merge requests
      if: $CI_MERGE_REQUEST_ID
    never_merge_request:  # never runs on merge requests
      if: $CI_MERGE_REQUEST_ID
      when: never
    configurator_deploying:  # runs if web and CREATE_EPHEMERAL set
      if: '($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline") && $HANDLING_INFRASTRUCTURE_DEPLOYMENT == "true" && $CREATE_CONFIGURATOR == "true"'
    configurator_destroying:  # runs if web and CREATE_EPHEMERAL set
      if: '($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline") && $HANDLING_INFRASTRUCTURE_DEPLOYMENT != null && $CLEAN_CONFIGURATOR != null'
    never_during_infrastructure:  # never runs if CLEANING is set (MR, web, etc)
      if: '($CI_PIPELINE_SOURCE == "trigger" || $CI_PIPELINE_SOURCE == "pipeline") && $HANDLING_INFRASTRUCTURE_DEPLOYMENT != null'
      when: never

###### job templates #######
############################
.base_rules_template:
  rules:
    - !reference [.base_rules, rules, never_during_infrastructure]
    - !reference [.base_rules, rules, merge_request]
    - !reference [.base_rules, rules, default_branch]
    - !reference [.base_rules, rules, tag]

.base_job_template:
  extends: .base_rules_template
  inherit:
    default: true
    variables: true
  tags:
    - dind

##### check ######
############################
package:check:
  image:
    name: ${GITLAB_BUILD_IMAGE}
    docker:
      user: root
  tags:
    - dind
  stage: check
  before_script:
    - ls -la
  script:
    - env | sort
    - df -h
    - lscpu
    - free -h
    - ls -la
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.md"
      when: never
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - "*.md"
      when: never
    - when: always

  needs: []

##### build ######
############################
package:build:
  image:
    name: ${GITLAB_BUILD_IMAGE}
    docker:
      user: root
  tags:
    - dind
  stage: build
  script:
    - env | sort
    - df -h
    - lscpu
    - free -h
    - env
    - ls -la
    - ./scripts/00-checkout-kernel.sh
    - ./scripts/01-build-kernel.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "*.md"
      when: never
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - "*.md"
      when: never
    - when: always
  needs: [package:check]
