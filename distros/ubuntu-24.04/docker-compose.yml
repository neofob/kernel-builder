---
services:
  kernel-builder:
    container_name: ubuntu-kernel-builder
    hostname: kernel-builder
    image: neofob/kernel-builder:${DOCKER_TAG}
    build:
      context: .
    restart: "no"
    user: "1000:1000" # 1st user in Ubuntu
    environment:
      - OLD_CONFIG=/tmp/config-current-linux
      - ARTIFACT=/tmp/kernel
    volumes:
      - ${KERNEL_TEMP}:/tmp:rw
      - ${KERNEL_SRC}:/opt/src/linux:rw
      - ${KERNEL_OUTPUT_DIR:-${GL_KERNEL_OUTPUT_DIR}}/ubuntu-24.04:/tmp/kernel:rw
      - ${KERNEL_CONFIG}:/tmp/config-current-linux:ro
    command:
      - build_kernel.sh

# TODO: do something like "/boot/config-`uname -r`" for OLD_CONFIG
#      docker run -it --rm --user 1000:1000 -v /tmp:/tmp -v /home/vagrant/src/linux:/home/kernel-builder/linux neofob/kernel-builder:23.04
